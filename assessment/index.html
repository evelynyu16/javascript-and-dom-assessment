<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirBNB SF Listings</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="#">🏠 SF Airbnb Listings</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
          aria-controls="navbarContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#listings">Listings</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">

      <!-- HERO -->
      <header class="hero-section text-center py-5">
        <h1>San Francisco Airbnb Listings</h1>
        <p class="lead">Explore 50 curated stays across the City by the Bay</p>
      </header>

      <hr />

      <!-- CONTROLS -->
      <section class="controls-section mb-4">
        <div class="row align-items-center g-2">
          <div class="col-md-5">
            <input
              type="text"
              id="search-input"
              class="form-control"
              placeholder="Search by name or neighborhood…"
            />
          </div>
          <div class="col-md-4">
            <div class="btn-group" role="group" aria-label="Filter by room type">
              <button class="btn btn-outline-secondary active" data-filter="all">All</button>
              <button class="btn btn-outline-secondary" data-filter="Entire home/apt">Entire Home</button>
              <button class="btn btn-outline-secondary" data-filter="Private room">Private Room</button>
            </div>
          </div>
          <div class="col-md-3 text-md-end">
            <select id="sort-select" class="form-select">
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="price-desc">Price: High → Low</option>
              <option value="rating">Highest Rated</option>
            </select>
          </div>
        </div>
        <p class="text-muted small mt-2" id="results-count"></p>
      </section>

      <!-- LISTINGS GRID -->
      <section>
        <h2 class="mb-4">Listings</h2>
        <div id="listings" class="row g-4">
          <!-- Cards injected by main.js -->
          <div class="col-12 text-center py-5" id="loading-state">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2 text-muted">Loading listings…</p>
          </div>
        </div>
      </section>

    </div><!-- /container -->

    <!-- DETAIL MODAL -->
    <div class="modal fade" id="listingModal" tabindex="-1" aria-labelledby="listingModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="listingModalLabel">Listing Detail</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modal-body">
            <!-- Injected by main.js -->
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <a id="modal-airbnb-link" href="#" target="_blank" class="btn btn-danger">View on Airbnb →</a>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-light text-center py-4 mt-5">
      <p class="mb-0">SF Airbnb Listings Explorer · Data from Inside Airbnb · Educational use only</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="js/main.js"></script>
  </body>
</html>
